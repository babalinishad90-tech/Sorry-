<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Mera Baccha ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #ff9a9e,
        #fad0c4,
        #ffd1ff
    );
}

.card{
    width:90%;
    max-width:500px;
    padding:35px;
    text-align:center;
    border-radius:30px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 35px rgba(0,0,0,.15);
    z-index:10;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    font-size:90px;
    animation:heartbeat 1.2s infinite;
}

@keyframes heartbeat{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

h1{
    color:#ff3366;
    margin:15px 0;
    font-size: 28px;
}

p{
    color:#444;
    line-height:1.8;
    font-size:18px;
    margin-bottom:30px;
}

.btn-container{
    position:relative;
    height:90px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn{
    border:none;
    padding:12px 30px;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#ff3366;
    color:white;
    position: relative;
    z-index: 11;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
    color:#444;
    position:absolute;
    left: 65%;
}

.music-btn{
    position:absolute;
    top:20px;
    right:20px;
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:22px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
    z-index: 20;
}

.floating{
    position:fixed;
    pointer-events:none;
    z-index: 5;
    white-space: nowrap;
}

@keyframes floatUp{
    0%{
        transform: translateY(100vh) scale(1) rotate(0deg);
        opacity:1;
    }
    100%{
        transform: translateY(-20vh) scale(1.5) rotate(360deg);
        opacity:0;
    }
}

/* Confetti ke liye alag animation taki wo upar se niche gire */
@keyframes confettiFall{
    0%{
        transform: translateY(-20px) rotate(0deg);
        opacity:1;
    }
    100%{
        transform: translateY(120vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <div class="heart" id="emoji">❤️</div>
    <h1 id="title">Mujhse Galti Ho Gayi 🥺</h1>

    <p id="text">
        Sach me mera tumhe hurt karne ka koi intention nahi tha. Please yaar 🥺<br>
        Itna bhi gussa mat ho 😭<br>
        Main Biryani bhi khilaungi 🍗<br><br>
        Tum meri life ka bahut important part ho.<br>
        Tumhari smile mere liye sab kuch hai 😊<br><br>
        Kya tum mujhe maaf karogi? 🥺💕
    </p>

    <div class="btn-container">
        <button class="btn" id="yesBtn" onclick="forgiveMe()">Haan ❤️</button>
        <button class="btn" id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Nahi 😢</button>
    </div>
</div>

<script>
// "Nahi" par hove karne se jo gusse wale messages upar aayenge
const messages = [
    "Maaf kar do na please 🥺",
    "Itna gussa sehat ke liye accha nahi hai 😭",
    "Biryani cancel ho jayegi fir! 🍗",
    "Aise mat karo yaar ❤️",
    "Maan jao na cutie pie 💕",
    "Ek pyari si smile de do ab 😊"
];

let yesScale = 1;
const music = document.getElementById("bgMusic");

function toggleMusic(){
    if(!music) return;
    if(music.paused){
        music.play().catch(()=>{
            alert("Pehle screen par kahin bhi click karein, fir music play hoga (Browser Security Rule).");
        });
    } else {
        music.pause();
    }
}

function moveButton(){
    const noBtn = document.getElementById("noBtn");
    
    // Button ko screen se bahar na bhejne ke liye safe random position
    const x = Math.random() * 120 - 60;
    const y = Math.random() * 80 - 40;
    
    noBtn.style.left = `calc(65% + ${x}px)`;
    noBtn.style.top = `calc(50% + ${y}px)`;
    
    // Title badalna jab wo "Nahi" par hove kare
    document.getElementById("title").innerText = messages[Math.floor(Math.random() * messages.length)];
    
    // "Haan" button ka size bada karna
    if(yesScale < 2.5){
        yesScale += 0.15;
        document.getElementById("yesBtn").style.transform = `scale(${yesScale})`;
    }
}

function forgiveMe(){
    document.getElementById("emoji").innerHTML = "💖";
    document.getElementById("title").innerHTML = "Yayyy! ❤️";
    
    document.getElementById("text").innerHTML = `
        Thank you mera baccha 🥹❤️<br><br>
        Tum meri life ka sabse pyara hissa ho.<br>
        Main kabhi bhi tumhe intentionally hurt nahi karna chahti.<br><br>
        Promise karti hu ki aage se aur zyada care karungi,<br>
        aur hamesha tumhari smile ki wajah banne ki koshish karungi 💕<br><br>
        Love you so much mera cutie pie ❤️🥰😘
    `;
    
    document.querySelector(".btn-container").style.display = "none";
    
    // Floating text items (Niche se upar)
    for(let i=0; i<40; i++){
        setTimeout(createHeart, i * 150);
    }
    
    // Confetti and celebration emojis (Upar se niche)
    for(let i=0; i<50; i++){
        setTimeout(() => {
            const confetti = document.createElement("div");
            const items = ["🎉", "✨", "💖", "💕", "🌸"];
            
            confetti.innerHTML = items[Math.floor(Math.random() * items.length)];
            confetti.classList.add("floating");
            
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.top = "-20px";
            confetti.style.fontSize = "25px";
            // Confetti ke liye down fall style text diya hai
            confetti.style.animation = "confettiFall 4s linear forwards";
            
            document.body.appendChild(confetti);
            
            setTimeout(() => { confetti.remove(); }, 4000);
        }, i * 80);
    }
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("floating");
    
    const emojis = [
        "Mera baby ❤️", 
        "Mera laddu baby 💖", 
        "Mera baccha 💕", 
        "Mera khadush baby 💝", 
        "mera Honey pie 🌸", 
        "meri jaan ✨", 
        "mera sweetheart 🥰"
    ];
    
    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    heart.style.left = Math.random() * 80 + 10 + "vw"; // Screen ke thoda andar rahega
    heart.style.bottom = "-50px";
    heart.style.fontSize = (Math.random() * 10 + 16) + "px";
    heart.style.animation = "floatUp 5s linear forwards";
    
    document.body.appendChild(heart);
    
    setTimeout(() => { heart.remove(); }, 5000);
}
</script>

</body>
</html>
